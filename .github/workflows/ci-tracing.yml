name: CI Tracing Pipeline (Jaeger)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tracing-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install OpenTelemetry Collector
        run: |
          curl -sSL https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.102.0/otelcol_0.102.0_linux_amd64.tar.gz | tar -xz
          sudo mv otelcol /usr/local/bin/

      - name: Add OpenTelemetry config for Jaeger
        run: |
          cat <<EOF > otel-jaeger-config.yaml
          receivers:
            otlp:
              protocols:
                grpc:
                http:
          exporters:
            jaeger:
              endpoint: "http://localhost:14268/api/traces"
          service:
            pipelines:
              traces:
                receivers: [otlp]
                exporters: [jaeger]
          EOF

      - name: Run Jaeger container
        run: |
          docker run -d --name jaeger \
            -e COLLECTOR_ZIPKIN_HTTP_PORT=9411 \
            -p 5775:5775/udp \
            -p 6831:6831/udp \
            -p 6832:6832/udp \
            -p 5778:5778 \
            -p 16686:16686 \
            -p 14268:14268 \
            -p 14250:14250 \
            -p 9411:9411 \
            jaegertracing/all-in-one:1.55

      - name: Run tests with tracing to Jaeger
        run: |
          otelcol --config otel-jaeger-config.yaml &
          npm test

      - name: Upload traces
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: ./otel-logs/
